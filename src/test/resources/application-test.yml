server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
    global-config:
      db-config:
        id-type: auto
  data:
    redis:
      host: 127.0.0.1
      port: 6379

jwt:
  secret: wakapix_secret_key_2024_padding_to_32bytes_minimum
  expiration: 86400000

sms:
  expire-time: 300000

wechat:
  app-id: wx_test_appid
  app-secret: wx_test_secret
  redirect-uri: http://localhost:8081/api/auth/wechat/callback